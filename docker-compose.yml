version: '3.8'

services:
  # PHP + Apache
  web:
    build:
      context: .
      args:
        USER_UID: ${UID:-1000}    # Берёт $UID с хоста или 1000 по умолчанию
        USER_GID: ${GID:-1000}    # Берёт $GID с хоста или 1000 по умолчанию
    container_name: php8.4-Apache2
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    environment:
      # Передаём настройки БД в окружение (опционально)
      DB_MYSQL_HOST: mysql
    networks:
      - app-network

  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: mysql8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: app_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

networks:
    app-network:
        driver: bridge
# Объявляем тома для сохранения данных
volumes:
  mysql-data:
  postgres-data:
